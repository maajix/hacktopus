version: "1.0"
name: "XSS Parameter Hunter"
description: "Comprehensive XSS hunting flow that combines crawling, parameter discovery, and targeted XSS testing tools for thorough cross-site scripting vulnerability detection."
tags:
  - xss
  - web

variables:
  url: "{{url}}"

stages:
  discovery:
    parallel: true
    description: "Parallel discovery of parameters and endpoints"
    combine_output: true
    tasks:
      - alias: "paramspider:discover"
        description: "Find hidden parameters through source analysis"
        settings:
          print_output: true

      - alias: "arjun:params"
        description: "Discover hidden parameters through fuzzing"
        settings:
          print_output: true

      - alias: "katana:crawl"
        description: "Deep crawling to find endpoints"
        settings:
          pipe_output: true
          print_output: true

  analysis:
    - alias: "gf:patterns"
      description: "Filter for potentially XSS-vulnerable parameters"
      settings:
        pipe_input: true
        pipe_output: true
        print_output: true

flow:
  - stage: discovery
  - stage: analysis