version: "1.0"
name: "Gather available URLs from Target"
description: "Find URLs, files, directories via crawling, fuzzing, return available non duplicate once"
tags:
  - recon
  - files
  - directories
  - active_scan

variables:
  url: "{{url}}"

stages:
  discovery:
    parallel: true
    description: "Parallel discovery of parameters and endpoints"
    combine_output: true
    # We need a way to say weather the input is distributed to all stages (all stages get the same stdin)
      # OR weather the output progresses through the internal stages, paramspider:discover gets the input, runs it, and the output will
      # be give to the next task in line which would be arjun:params, and so on.
    # Also we need an easiy way to find and list the aliases for tools because opening them all the time to see what they have is annoying
    # Also it would be good to create a way of orchestrating the stdout, maybe we want to pass the output to 2 different stages (maybe a variable?)
    # Also we may add the options to directly use commands in flows in addition to aliases
    tasks:
      - alias: "paramspider:discover"
        description: "Find hidden parameters through source analysis"
      - alias: "arjun:params"
        description: "Discover hidden parameters through fuzzing"
      - alias: "katana:crawl"
        description: "Deep crawling and JavaScript analysis"
      - alias: "waybackurls:fetch"
        description: "Historical URL discovery"
      - alias: "gau:fetch"
        description: "Passive URL discovery"

  check_alive:
    - alias: "httpx:stdin"
      description: "Check if the found URLs are available"

  remove_duplicates:
    - alias: "uro:urls"
      description: "Remove duplicate URLs"

flow:
  - stage: discovery
  - stage: remove_duplicates
  - stage: check_alive