description: "Comprehensive XSS hunting flow that combines crawling, parameter discovery, and targeted XSS testing tools for thorough cross-site scripting vulnerability detection."
variables:
  url: "{{url}}"

steps:
  - parallel:
      combine_output: true    # Combine all discovered parameters
      tasks:
        - alias: "paramspider:discover"
          print_output: true
          # Find hidden parameters through source analysis

        - alias: "arjun:params"
          print_output: true
          # Discover hidden parameters through fuzzing

        - alias: "katana:crawl"
          pipe_output: true
          print_output: true
          # Deep crawling to find endpoints

  - alias: "gf:patterns"
    pipe_input: true
    pipe_output: true
    print_output: true
    # Filter for potentially XSS-vulnerable parameters