version: "1.0"
name: "XSS Fuzzing"
description: "XSS discovery and validation"
tags:
  - xss
  - web
  - active_scan

stages:
  url_gathering:
    - flow: "get_xss_parameters"  # This flow would also use the 'url' flow variable
      description: "Gather potential XSS URLs containing GET parameters"

  exploitation:
    - alias: "gxss:scan"
      description: "Analyze endpoints for XSS vulnerabilities"

flow:
  - stage: url_gathering
  - stage: exploitation